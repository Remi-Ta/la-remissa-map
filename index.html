<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>La Rémissa Map</title>
<meta name="theme-color" content="#B34E6B">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Leaflet : seule librairie externe restante (CDN unpkg, très fiable) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
/* =========================================================
   LA RÉMISSA MAP — Feuille de style
   Palette imposée par la charte Softr existante :
   - Fond app        : #F8F9FA
   - Accent principal: #B34E6B (boutons, actifs, modale)
   Typo : Fraunces (titres, chaleureux) + Inter (texte, très lisible mobile)
   ========================================================= */

:root {
  --color-bg: #F8F9FA;
  --color-surface: #FFFFFF;
  --color-primary: #B34E6B;
  --color-primary-dark: #97405a;
  --color-primary-tint: #f6e9ed;
  --color-text: #26262b;
  --color-text-soft: #6b6b74;
  --color-border: #ECECEF;

  /* Catégories */
  --cat-manger: #F4B942;
  --cat-vert: #2ECC71;
  --cat-emplettes: #A07855;
  --cat-culture: #3498DB;
  --cat-experiences: #BB86FC;
  --cat-schlof: #E91E63;
  --cat-divers: #4A5568;

  /* Statuts */
  --status-afaire-bg: #E2E8F0;
  --status-afaire-text: #475569;
  --status-approuve-bg: #A7F3D0;
  --status-approuve-text: #065F46;
  --status-bof-bg: #FEF3C7;
  --status-bof-text: #92400E;

  --radius-lg: 20px;
  --radius-md: 14px;
  --radius-sm: 10px;
  --shadow-card: 0 2px 14px rgba(30, 20, 25, 0.07);
  --shadow-modal: 0 20px 60px rgba(20, 10, 15, 0.25);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --container-max: 1320px; /* largeur max sur grand écran — 720px de trop peu utilisait l'espace desktop */
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: var(--color-bg);
  color: var(--color-text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-tap-highlight-color: transparent;
  overflow: hidden; /* le scroll se fait dans les vues, pas la page */
}

button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* ---------- HEADER ---------- */
.app-header {
  padding: 18px 24px 16px;
  background: linear-gradient(160deg, #fbeef1 0%, #f8f9fa 55%, #f8f9fa 100%);
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0;
}
.header-inner { max-width: var(--container-max); margin: 0 auto; }

.header-top-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.app-title {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 26px;
  margin: 0 0 4px;
  letter-spacing: -0.01em;
  color: var(--color-text);
}
.app-title span { color: var(--color-primary); }
.welcome-text {
  margin: 0;
  font-size: 14px;
  color: var(--color-text-soft);
}

/* Nav en haut à droite, avec trait souligné sous l'onglet actif */
.top-nav {
  display: flex;
  gap: 22px;
  flex-shrink: 0;
  padding-top: 4px;
}
.nav-tab {
  border: none;
  background: none;
  padding: 4px 2px 10px;
  font-size: 14.5px;
  font-weight: 600;
  color: var(--color-text-soft);
  position: relative;
  display: flex;
  align-items: center;
  gap: 6px;
}
.nav-tab svg { width: 17px; height: 17px; }
.nav-tab.active { color: var(--color-text); }
.nav-tab.active::after {
  content: "";
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 2.5px;
  background: var(--color-primary);
  border-radius: 2px;
}

/* Bandeau de statistiques */
.stats-row {
  display: flex;
  gap: 10px;
  margin-top: 12px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.stats-row::-webkit-scrollbar { display: none; }
.stat-card {
  flex: 1 1 130px;
  min-width: 130px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: 8px 12px;
  box-shadow: var(--shadow-card);
}
.stat-label {
  font-size: 11.5px;
  font-weight: 600;
  margin: 0 0 2px;
}
.stat-value {
  font-size: 19px;
  font-weight: 700;
  color: var(--color-text);
  font-family: 'Fraunces', serif;
}

/* ---------- BARRE D'OUTILS (titre section + recherche + filtres) ---------- */
.toolbar-panel {
  padding: 16px 24px;
  background: var(--color-bg);
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0;
}
.toolbar-inner {
  max-width: var(--container-max);
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.toolbar-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.toolbar-heading h2 {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 600;
  margin: 0 0 2px;
}
.toolbar-heading p {
  font-size: 13px;
  color: var(--color-text-soft);
  margin: 0;
}

/* Étiquettes de filtre cliquables (catégorie + statut), colorées pour que
   la couleur se comprenne directement plutôt que via un menu déroulant */
.chip-scroll {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.chip-scroll::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  border: 1.5px solid transparent;
  background: var(--color-surface);
  color: var(--color-text);
  padding: 6px 13px;
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  box-shadow: var(--shadow-card);
  transition: transform .12s ease, border-color .12s ease;
}
.chip:active { transform: scale(0.95); }
.chip .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.chip.active { border-color: currentColor; }
.chip.chip-all.active { border-color: var(--color-text); }

.toolbar-toggle-row { display: flex; justify-content: flex-end; }
.toggle-resolved-link {
  background: none;
  border: none;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--color-primary);
  cursor: pointer;
  padding: 2px 0;
}
.toggle-resolved-link.active {
  color: #a3a3ac;
  text-decoration: line-through;
}

.search-bar {
  width: 260px;
  max-width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 999px;
  padding: 9px 16px;
  box-shadow: var(--shadow-card);
  flex-shrink: 0;
}
.icon-search { width: 18px; height: 18px; color: var(--color-text-soft); flex-shrink: 0; }
.search-bar input {
  flex: 1;
  min-width: 0;
  border: none;
  outline: none;
  font-size: 14.5px;
  background: transparent;
  color: var(--color-text);
}
.search-bar input::placeholder { color: #a9a9b2; }
.clear-btn {
  border: none;
  background: var(--color-border);
  color: var(--color-text-soft);
  width: 20px;
  height: 20px;
  border-radius: 50%;
  font-size: 14px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

@media (max-width: 640px) {
  .toolbar-top-row { flex-direction: column; align-items: stretch; }
  .search-bar { width: 100%; }

  /* Header et barre d'outils compactés au maximum : priorité à la carte */
  .app-header { padding: 10px 14px 8px; }
  .welcome-text { display: none; }
  .stats-row { margin-top: 8px; gap: 6px; }
  .stat-card { padding: 6px 10px; flex: 1 1 100px; min-width: 100px; }
  .stat-value { font-size: 16px; }
  .stat-label { font-size: 10.5px; }
  .toolbar-panel { padding: 8px 14px; }
  .toolbar-heading p { display: none; }
  .toolbar-heading h2 { font-size: 15px; }
  .chip { padding: 5px 10px; font-size: 11.5px; }

  /* La carte s'étend au maximum, avec juste un mince espace autour */
  #mapView { padding: 8px 8px 16px; }
}

/* ---------- CONTENU (carte / liste) ---------- */
.content {
  flex: 1;
  min-height: 0;
  position: relative;
  max-width: var(--container-max);
  width: 100%;
  margin: 0 auto;
}
.view { display: none; height: 100%; }
.view.active { display: block; }

#mapView { height: 100%; width: 100%; box-sizing: border-box; padding: 16px 24px 28px; }
#map { height: 100%; width: 100%; border-radius: var(--radius-lg); overflow: hidden; }

#listView {
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 24px 40px;
}

/* Mode "liste" : la page entière défile normalement (plus de panneau à
   scroll interne bloqué à la hauteur du viewport) — activé/désactivé via
   la classe .list-mode posée sur <html> par switchView(). */
html.list-mode, html.list-mode body {
  height: auto;
  overflow: auto;
}
html.list-mode #app { height: auto; min-height: 100%; }
html.list-mode .content { height: auto; }
html.list-mode #listView { height: auto; overflow: visible; }

.cards-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}
@media (min-width: 560px) {
  .cards-grid { grid-template-columns: 1fr 1fr; }
}
@media (min-width: 900px) {
  .cards-grid { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 1250px) {
  .cards-grid { grid-template-columns: repeat(4, 1fr); }
}

.empty-state, .error-state {
  text-align: center;
  color: var(--color-text-soft);
  font-size: 14px;
  margin-top: 40px;
  padding: 0 20px;
}

/* ---------- CARTES (fiches lieu) ---------- */
.place-card {
  background: var(--color-surface);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--color-border);
  display: flex;
  flex-direction: column;
  transition: transform .15s ease, box-shadow .15s ease;
}
.place-card:active { transform: scale(0.98); }

.place-card-photo-wrap { position: relative; }
.place-card-photo {
  width: 100%;
  aspect-ratio: 16 / 10;
  object-fit: cover;
  background: linear-gradient(135deg, #f0f0f2, #e6e6ea);
  display: block;
}
.place-card-photo.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  color: #b3b3bc;
  font-size: 12.5px;
  font-weight: 500;
}
.place-card-photo.placeholder svg { width: 26px; height: 26px; opacity: 0.7; }
.card-badges-overlay {
  position: absolute;
  top: 10px;
  left: 10px;
  display: flex;
  gap: 5px;
  max-width: calc(100% - 20px);
}
.badge-overflow {
  background: rgba(255,255,255,0.9) !important;
  color: var(--color-text) !important;
}

.place-card-body { padding: 18px 18px 20px; }
.place-card-title {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 17px;
  margin: 0 0 12px;
  color: var(--color-text);
}
.badge-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }

.badge {
  display: inline-flex;
  align-items: center;
  font-size: 11.5px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 999px;
  color: #fff;
  line-height: 1.3;
  white-space: nowrap;
}
.badge-status {
  color: var(--color-text);
  font-weight: 600;
}

.place-card-address {
  font-size: 13px;
  color: var(--color-text-soft);
  margin: 0 0 12px;
  display: flex;
  align-items: flex-start;
  gap: 5px;
}
.card-details-btn { font-size: 13.5px; padding: 10px 16px; }

/* ---------- MODALE DE DÉTAILS ---------- */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(20, 15, 18, 0.55);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 1000;
  padding: 0;
}
/* CRUCIAL : sans cette règle, l'attribut HTML "hidden" est écrasé par le
   "display: flex" ci-dessus (même spécificité, mais CSS auteur > CSS
   navigateur), et la modale reste visible + bloque les clics même masquée. */
.modal-overlay[hidden] { display: none; }
@media (min-width: 560px) {
  .modal-overlay { align-items: center; padding: 20px; }
}

.modal {
  background: var(--color-surface);
  width: 100%;
  max-width: 520px;
  max-height: 88vh;
  border-radius: 22px 22px 0 0;
  overflow-y: auto;
  position: relative;
  box-shadow: var(--shadow-modal);
  animation: slideUp .25s ease;
}
@media (min-width: 560px) {
  .modal { border-radius: 22px; }
}
@keyframes slideUp {
  from { transform: translateY(30px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal-close {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 2;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: none;
  background: rgba(0,0,0,0.45);
  color: #fff;
  font-size: 20px;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.modal-photo-wrap { margin-bottom: 16px; }
.modal-photo {
  width: 100%;
  max-width: 220px;
  aspect-ratio: 4 / 3;
  object-fit: cover;
  display: block;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, #f0f0f2, #e6e6ea);
}
.modal-photo.placeholder {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 6px;
  color: #b3b3bc;
  font-size: 12.5px;
  font-weight: 500;
}
.modal-photo.placeholder svg { width: 28px; height: 28px; opacity: 0.7; }
.modal-body { padding: 26px 26px 30px; }
.modal-title {
  font-family: 'Fraunces', serif;
  font-weight: 600;
  font-size: 22px;
  margin: 0 0 8px;
}
.modal-info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin: 18px 0 4px;
}
.modal-field-label {
  font-size: 12px;
  font-weight: 600;
  color: var(--color-text-soft);
  margin: 0 0 4px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.modal-field-value {
  font-size: 14px;
  color: var(--color-text);
  margin: 0;
  word-break: break-word;
}
.modal-field-value a { color: var(--color-primary); }
.modal-date {
  font-size: 12px;
  font-weight: 600;
  color: var(--color-text-soft);
  text-transform: uppercase;
  letter-spacing: 0.03em;
  margin: 18px 0 28px;
  line-height: 1.6;
}
.modal-description {
  font-size: 14.5px;
  line-height: 1.6;
  color: var(--color-text);
  white-space: pre-line;
  margin: 0 0 18px;
}

.btn-primary {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  border: none;
  background: var(--color-primary);
  color: #fff;
  font-size: 15.5px;
  font-weight: 700;
  padding: 15px 20px;
  border-radius: var(--radius-md);
  text-decoration: none;
  transition: background .15s ease;
}
.btn-primary:active { background: var(--color-primary-dark); }

/* ---------- MARQUEURS CARTE (pins façon Google Maps) ---------- */
.pin-marker {
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.35));
}
.pin-marker svg { display: block; }
.leaflet-popup-content-wrapper { border-radius: var(--radius-sm); }

/* ---------- CHARGEMENT / ERREUR ---------- */
/* Générique catégorie -> couleur, appliqué en inline-style depuis le JS
   (voir CATEGORY_COLORS dans app.js) mais classes de secours ci-dessous */
.cat-manger      { background: var(--cat-manger); }
.cat-vert        { background: var(--cat-vert); }
.cat-emplettes   { background: var(--cat-emplettes); }
.cat-culture     { background: var(--cat-culture); }
.cat-experiences { background: var(--cat-experiences); }
.cat-schlof      { background: var(--cat-schlof); }
.cat-divers      { background: var(--cat-divers); }
.leaflet-cluster-anim .leaflet-marker-icon, .leaflet-cluster-anim .leaflet-marker-shadow {
	-webkit-transition: -webkit-transform 0.3s ease-out, opacity 0.3s ease-in;
	-moz-transition: -moz-transform 0.3s ease-out, opacity 0.3s ease-in;
	-o-transition: -o-transform 0.3s ease-out, opacity 0.3s ease-in;
	transition: transform 0.3s ease-out, opacity 0.3s ease-in;
}

.leaflet-cluster-spider-leg {
	/* stroke-dashoffset (duration and function) should match with leaflet-marker-icon transform in order to track it exactly */
	-webkit-transition: -webkit-stroke-dashoffset 0.3s ease-out, -webkit-stroke-opacity 0.3s ease-in;
	-moz-transition: -moz-stroke-dashoffset 0.3s ease-out, -moz-stroke-opacity 0.3s ease-in;
	-o-transition: -o-stroke-dashoffset 0.3s ease-out, -o-stroke-opacity 0.3s ease-in;
	transition: stroke-dashoffset 0.3s ease-out, stroke-opacity 0.3s ease-in;
}
.marker-cluster-small {
	background-color: rgba(181, 226, 140, 0.6);
	}
.marker-cluster-small div {
	background-color: rgba(110, 204, 57, 0.6);
	}

.marker-cluster-medium {
	background-color: rgba(241, 211, 87, 0.6);
	}
.marker-cluster-medium div {
	background-color: rgba(240, 194, 12, 0.6);
	}

.marker-cluster-large {
	background-color: rgba(253, 156, 115, 0.6);
	}
.marker-cluster-large div {
	background-color: rgba(241, 128, 23, 0.6);
	}

	/* IE 6-8 fallback colors */
.leaflet-oldie .marker-cluster-small {
	background-color: rgb(181, 226, 140);
	}
.leaflet-oldie .marker-cluster-small div {
	background-color: rgb(110, 204, 57);
	}

.leaflet-oldie .marker-cluster-medium {
	background-color: rgb(241, 211, 87);
	}
.leaflet-oldie .marker-cluster-medium div {
	background-color: rgb(240, 194, 12);
	}

.leaflet-oldie .marker-cluster-large {
	background-color: rgb(253, 156, 115);
	}
.leaflet-oldie .marker-cluster-large div {
	background-color: rgb(241, 128, 23);
}

.marker-cluster {
	background-clip: padding-box;
	border-radius: 20px;
	}
.marker-cluster div {
	width: 30px;
	height: 30px;
	margin-left: 5px;
	margin-top: 5px;

	text-align: center;
	border-radius: 15px;
	font: 12px "Helvetica Neue", Arial, Helvetica, sans-serif;
	}
.marker-cluster span {
	line-height: 30px;
	}
/* ================= styles admin.html (fusionnés) ================= */
/* ================= ADMIN — styles additionnels ================= */

html.admin-page, body.admin-body {
  overflow-y: auto;
  height: auto;
}

.admin-header {
  padding: 20px;
  background: linear-gradient(160deg, #fbeef1 0%, #f8f9fa 60%);
  border-bottom: 1px solid var(--color-border);
}
.admin-header code {
  background: #fff;
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 12.5px;
}

.admin-main {
  max-width: 640px;
  margin: 0 auto;
  padding: 18px 16px 60px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.admin-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 18px;
  box-shadow: var(--shadow-card);
}
.admin-card h2 {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  margin: 0 0 8px;
}
.admin-hint {
  font-size: 13px;
  color: var(--color-text-soft);
  margin: 0 0 12px;
}
.admin-hint-inline {
  font-weight: 400;
  font-size: 11.5px;
  color: var(--color-text-soft);
}

.file-input-label {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--color-primary-tint);
  color: var(--color-primary-dark);
  border: 1px dashed var(--color-primary);
  padding: 10px 16px;
  border-radius: var(--radius-md);
  font-weight: 600;
  font-size: 14px;
}

.admin-form {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.admin-form label {
  display: flex;
  flex-direction: column;
  gap: 5px;
  font-size: 13px;
  font-weight: 600;
  color: var(--color-text);
}
.admin-form input,
.admin-form textarea {
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  font-size: 14.5px;
  font-weight: 400;
  font-family: inherit;
  color: var(--color-text);
  background: var(--color-bg);
}
.admin-form input:focus,
.admin-form textarea:focus {
  outline: 2px solid var(--color-primary);
  outline-offset: 1px;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.form-actions {
  display: flex;
  gap: 10px;
  margin-top: 4px;
}
.form-actions .btn-primary { width: auto; flex: 1; padding: 12px 16px; font-size: 14.5px; }

.btn-secondary, .btn-danger {
  border: none;
  border-radius: var(--radius-md);
  padding: 12px 16px;
  font-weight: 700;
  font-size: 14px;
}
.btn-secondary {
  background: var(--color-border);
  color: var(--color-text);
}
.btn-danger {
  background: #FDECEC;
  color: #B3261E;
  margin-top: 10px;
  width: 100%;
}

.admin-table-wrap { overflow-x: auto; }
.admin-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.admin-table th, .admin-table td {
  text-align: left;
  padding: 8px 10px;
  border-bottom: 1px solid var(--color-border);
  white-space: nowrap;
  max-width: 160px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.admin-table th { color: var(--color-text-soft); font-weight: 600; }
.row-actions { display: flex; gap: 6px; }
.row-actions button {
  border: none;
  background: var(--color-border);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 12px;
}
.row-actions .del-btn { background: #FDECEC; color: #B3261E; }

#exportBtn { width: 100%; }


/* --- Leaflet.markercluster (fusionné) --- */
.leaflet-cluster-anim .leaflet-marker-icon, .leaflet-cluster-anim .leaflet-marker-shadow {
	-webkit-transition: -webkit-transform 0.3s ease-out, opacity 0.3s ease-in;
	-moz-transition: -moz-transform 0.3s ease-out, opacity 0.3s ease-in;
	-o-transition: -o-transform 0.3s ease-out, opacity 0.3s ease-in;
	transition: transform 0.3s ease-out, opacity 0.3s ease-in;
}

.leaflet-cluster-spider-leg {
	/* stroke-dashoffset (duration and function) should match with leaflet-marker-icon transform in order to track it exactly */
	-webkit-transition: -webkit-stroke-dashoffset 0.3s ease-out, -webkit-stroke-opacity 0.3s ease-in;
	-moz-transition: -moz-stroke-dashoffset 0.3s ease-out, -moz-stroke-opacity 0.3s ease-in;
	-o-transition: -o-stroke-dashoffset 0.3s ease-out, -o-stroke-opacity 0.3s ease-in;
	transition: stroke-dashoffset 0.3s ease-out, stroke-opacity 0.3s ease-in;
}

.marker-cluster-small {
	background-color: rgba(181, 226, 140, 0.6);
	}
.marker-cluster-small div {
	background-color: rgba(110, 204, 57, 0.6);
	}

.marker-cluster-medium {
	background-color: rgba(241, 211, 87, 0.6);
	}
.marker-cluster-medium div {
	background-color: rgba(240, 194, 12, 0.6);
	}

.marker-cluster-large {
	background-color: rgba(253, 156, 115, 0.6);
	}
.marker-cluster-large div {
	background-color: rgba(241, 128, 23, 0.6);
	}

	/* IE 6-8 fallback colors */
.leaflet-oldie .marker-cluster-small {
	background-color: rgb(181, 226, 140);
	}
.leaflet-oldie .marker-cluster-small div {
	background-color: rgb(110, 204, 57);
	}

.leaflet-oldie .marker-cluster-medium {
	background-color: rgb(241, 211, 87);
	}
.leaflet-oldie .marker-cluster-medium div {
	background-color: rgb(240, 194, 12);
	}

.leaflet-oldie .marker-cluster-large {
	background-color: rgb(253, 156, 115);
	}
.leaflet-oldie .marker-cluster-large div {
	background-color: rgb(241, 128, 23);
}

.marker-cluster {
	background-clip: padding-box;
	border-radius: 20px;
	}
.marker-cluster div {
	width: 30px;
	height: 30px;
	margin-left: 5px;
	margin-top: 5px;

	text-align: center;
	border-radius: 15px;
	font: 12px "Helvetica Neue", Arial, Helvetica, sans-serif;
	}
.marker-cluster span {
	line-height: 30px;
	}

/* ---------- Couleur des clusters (placé APRÈS la lib pour avoir la priorité) ---------- */
.marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
  background: rgba(179, 78, 107, 0.25) !important;
}
.marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
  background: var(--color-primary) !important;
  color: #fff !important;
  font-weight: 700 !important;
}
</style>
</head>
<body>

<div id="app">

  <!-- ===== HEADER : titre, nav (haut-droite avec soulignement) + stats ===== -->
  <header class="app-header">
    <div class="header-inner">
      <div class="header-top-row">
        <div class="header-titles">
          <h1 class="app-title">La Rémissa <span>Map</span></h1>
          <p class="welcome-text" id="welcomeText">Bienvenue — Tout est prêt</p>
        </div>
        <nav class="top-nav" aria-label="Navigation">
          <button class="nav-tab active" data-view="mapView">
            <svg viewBox="0 0 24 24" fill="none"><path d="M9 20l-6-2V4l6 2m0 14l6-2m-6 2V6m6 12l6 2V6l-6-2m0 16V4m0 2L9 4" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
            Carte
          </button>
          <button class="nav-tab" data-view="listView">
            <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="4" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="4" y="13" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="13" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/></svg>
            Liste
          </button>
        </nav>
      </div>

      <!-- Bandeau de statistiques (nombre de lieux par statut + taux d'approbation) -->
      <div class="stats-row" id="statsRow"></div>
    </div>
  </header>

  <!-- ===== BARRE D'OUTILS : titre de section + recherche + filtres ===== -->
  <div class="toolbar-panel">
    <div class="toolbar-inner">
      <div class="toolbar-top-row">
        <div class="toolbar-heading">
          <h2>Tous les lieux</h2>
          <p>Recherchez, filtrez et ouvrez une fiche pour voir les détails.</p>
        </div>
        <div class="search-bar">
          <svg class="icon-search" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M20 20L16.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input type="text" id="searchInput" placeholder="Rechercher un lieu…" autocomplete="off" inputmode="search">
          <button id="clearSearch" class="clear-btn" hidden aria-label="Effacer la recherche">&times;</button>
        </div>
      </div>

      <!-- Étiquettes cliquables colorées : la couleur donne directement le sens du code couleur -->
      <div class="chip-scroll" id="categoryChips" role="tablist" aria-label="Filtrer par catégorie"></div>
      <div class="chip-scroll" id="statusChips" role="tablist" aria-label="Filtrer par statut"></div>

      <div class="toolbar-toggle-row">
        <button type="button" id="toggleResolvedBtn" class="toggle-resolved-link">Masquer les lieux faits et non validés</button>
      </div>
    </div>
  </div>

  <!-- ===== CONTENU : Carte ou Liste selon l'onglet actif ===== -->
  <main class="content">

    <section id="mapView" class="view active">
      <div id="map"></div>
    </section>

    <section id="listView" class="view">
      <div class="cards-grid" id="cardsGrid"></div>
      <p class="empty-state" id="emptyState" hidden>Aucun lieu ne correspond à votre recherche.</p>
    </section>

  </main>

  <!-- ===== MODALE DE DÉTAILS ===== -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Fermer">&times;</button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

</div>

<!-- Leaflet (CDN) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Logique de l'application -->
<script>
/* =========================================================================
   LA RÉMISSA MAP — app.js
   Application mobile-first : data/lieux.csv -> Carte Leaflet + Liste + Recherche
   ========================================================================= */

/* ============================================================
   1. CONFIGURATION — À MODIFIER PAR VOUS
   ============================================================
   Les données ne viennent plus de Google Sheets en direct (problèmes de CORS
   sur GitHub Pages) mais d'un fichier CSV qui vit DANS votre dépôt :
   data/lieux.csv

   Pour mettre à jour vos lieux :
   - Option simple : ouvrez admin.html (inclus dans ce projet), gérez vos
     lieux dans le formulaire, cliquez sur "Télécharger le CSV", puis
     remplacez le fichier data/lieux.csv dans votre dépôt GitHub par celui
     téléchargé (glisser-déposer sur github.com fonctionne très bien).
   - Option manuelle : éditez data/lieux.csv directement sur github.com
     (bouton crayon "Edit this file"), en respectant bien les colonnes.
   - Option Google Sheets : continuez à tenir votre Sheets comme avant, puis
     Fichier > Télécharger > Valeurs séparées par des virgules (.csv),
     renommez le fichier téléchargé en "lieux.csv" et remplacez-le dans
     data/ sur votre dépôt.

   Dans tous les cas, gardez EXACTEMENT les mêmes en-têtes de colonnes.
   ============================================================ */
const SHEET_CSV_URL = "data/lieux.csv";


// Centre par défaut de la carte : Île-de-France (utilisé si pas encore de données,
// et comme vue de base large — ne bouge plus ensuite au fil des filtres)
const DEFAULT_CENTER = [48.75, 2.45];
const DEFAULT_ZOOM = 9;

/* ============================================================
   2. CHARTE GRAPHIQUE — couleurs des catégories et statuts
   ============================================================ */
const CATEGORY_COLORS = {
  "À boire & à manger": "#F4B942",
  "Au vert":            "#2ECC71",
  "Emplettes":          "#A07855",
  "Cul'ture":           "#3498DB",
  "Expériences":        "#BB86FC",
  "Au schlof !":        "#E91E63",
  "Divers":             "#4A5568",
};
const CATEGORY_ORDER = Object.keys(CATEGORY_COLORS);
const DEFAULT_CATEGORY_COLOR = "#4A5568";

const STATUS_STYLES = {
  "À faire":   { bg: "#E2E8F0", text: "#475569" },
  "Approuvé":  { bg: "#A7F3D0", text: "#065F46" },
  "Surcoté":   { bg: "#FEF3C7", text: "#92400E" },
};
const STATUS_ORDER = Object.keys(STATUS_STYLES);

const WELCOME_MESSAGES = [
  "Bienvenue — Tout est prêt",
  "Prêt à explorer nos lieux favoris ?",
  "Une envie de sortie ? On a ce qu'il faut.",
  "Bienvenue — La carte n'attend que vous",
  "Toujours à jour, toujours par ici",
];

/* ============================================================
   3. ÉTAT DE L'APPLICATION
   ============================================================ */
const state = {
  allPlaces: [],
  filtered: [],
  category: "all",   // "all" ou une des clés de CATEGORY_COLORS
  status: "all",     // "all" ou une des clés de STATUS_STYLES
  search: "",
  hideResolved: false, // masque les lieux "faits" (Approuvé/Surcoté), ne garde que "À faire"
  map: null,
  markersLayer: null,
};

/* ============================================================
   4. OUTILS
   ============================================================ */

// Normalise un texte pour une recherche insensible aux accents/majuscules
function normalize(str) {
  return (str || "")
    .toString()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toLowerCase()
    .trim();
}

function categoryColor(cat) {
  return CATEGORY_COLORS[cat] || DEFAULT_CATEGORY_COLOR;
}

// Récupère la première URL valide d'une cellule "Photos".
// Formats rencontrés : une URL brute, plusieurs URL séparées par une virgule /
// un espace / un retour à la ligne, ou le format Softr "nomfichier.png (https://...)".
// On cherche donc n'importe quelle sous-chaîne commençant par http(s):// dans le texte,
// peu importe ce qui l'entoure (parenthèses, virgules, etc.).
function firstPhotoUrl(raw) {
  if (!raw) return null;
  const match = raw.match(/https?:\/\/[^\s")]+/i);
  return match ? match[0] : null;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}

/* ============================================================
   5. CHARGEMENT DES DONNÉES (data/lieux.csv -> objets)
   ============================================================ */
function loadData() {
  console.log("[La Rémissa Map] Démarrage du chargement :", SHEET_CSV_URL);

  if (typeof Papa === "undefined") {
    console.error("[La Rémissa Map] Papa (PapaParse) n'est pas défini au moment de loadData(). Vérifiez que js/vendor/papaparse.min.js est bien présent.");
    return;
  }

  Papa.parse(SHEET_CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: (results) => {
      console.log("[La Rémissa Map] Papa.parse complete() déclenché.", results);
      try {
        state.allPlaces = results.data
          .map(rowToPlace)
          .filter(p => p.nom); // on ignore les lignes vides / sans nom
        console.log("[La Rémissa Map] Lieux chargés :", state.allPlaces.length);
        buildFilterChips();
        renderStats();
        applyFilters(); // gère déjà le centrage : IDF par défaut si aucun filtre actif
      } catch (err) {
        console.error("[La Rémissa Map] Erreur pendant le traitement des données :", err);
      }
    },
    error: (err) => {
      console.error("[La Rémissa Map] Papa.parse error() déclenché :", err);
    },
  });
}

// Transforme une ligne du CSV (colonnes françaises exactes) en objet "place"
function rowToPlace(row) {
  const lat = parseFloat((row["Latitude"] || "").toString().replace(",", "."));
  const lng = parseFloat((row["Longitude"] || "").toString().replace(",", "."));

  // Un lieu peut avoir plusieurs catégories séparées par une virgule dans le
  // CSV (ex : "Cul'ture, Expériences"). "categories" liste tout, "categorie"
  // garde la première (utilisée par défaut pour la couleur/l'affichage).
  const categories = (row["Catégorie"] || "")
    .split(",")
    .map(c => c.trim())
    .filter(Boolean);

  return {
    nom: (row["Nom du lieu"] || "").trim(),
    categories: categories,
    categorie: categories[0] || "",
    statut: (row["Statut"] || "").trim(),
    adresse: (row["Adresse"] || "").trim(),
    urlMaps: (row["URL Google Maps"] || "").trim(),
    photo: firstPhotoUrl(row["Photos"]),
    infos: (row["Informations"] || "").trim(),
    site: (row["Site web"] || "").trim(),
    dateAjout: (row["Testé le"] || "").trim(),
    lat: Number.isFinite(lat) ? lat : null,
    lng: Number.isFinite(lng) ? lng : null,
  };
}

// Détermine la couleur à utiliser pour un lieu donné :
// - si un ou plusieurs filtres de catégorie sont actifs ET que ce lieu
//   correspond à l'un d'eux -> couleur de cette catégorie filtrée
// - sinon -> couleur de la première catégorie du lieu
function effectiveColor(place) {
  if (state.category !== "all" && place.categories.includes(state.category)) {
    return categoryColor(state.category);
  }
  return categoryColor(place.categorie);
}

// Génère un badge par catégorie du lieu (un lieu peut en avoir plusieurs)
function categoryBadgesHtml(place) {
  return place.categories
    .map(cat => `<span class="badge" style="background:${categoryColor(cat)}">${escapeHtml(cat)}</span>`)
    .join("");
}

// Variante pour l'overlay sur la photo des cartes : au-delà de 2 catégories,
// affiche un badge "+N" plutôt que de surcharger la vignette
function cardCategoryOverlayHtml(place, maxShown = 2) {
  const shown = place.categories.slice(0, maxShown);
  const rest = place.categories.length - shown.length;
  return shown.map(cat => `<span class="badge" style="background:${categoryColor(cat)}">${escapeHtml(cat)}</span>`).join("")
    + (rest > 0 ? `<span class="badge badge-overflow">+${rest}</span>` : "");
}

/* ============================================================
   6. CARTE LEAFLET
   ============================================================
   Fond de carte : Thunderforest.Atlas en priorité, avec repli AUTOMATIQUE
   et immédiat sur CartoDB Positron (gratuit, sans clé) si Thunderforest ne
   répond pas (clé invalide, quota dépassé, service indisponible…) — comme ça
   la carte a toujours un fond, quoi qu'il arrive.
   ============================================================ */
const THUNDERFOREST_API_KEY = "3rFZLyRHrpulP9ykA0U5";

function initMap() {
  state.map = L.map("map", { zoomControl: true }).setView(DEFAULT_CENTER, DEFAULT_ZOOM);

  const cartoFallback = L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: "abcd",
    maxZoom: 20,
  });

  if (THUNDERFOREST_API_KEY) {
    const thunderLayer = L.tileLayer(`https://{s}.tile.thunderforest.com/atlas/{z}/{x}/{y}.png?apikey=${THUNDERFOREST_API_KEY}`, {
      attribution: '&copy; <a href="https://www.thunderforest.com/">Thunderforest</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      subdomains: "abc",
      maxZoom: 22,
    });

    let fallbackTriggered = false;
    thunderLayer.on("tileerror", () => {
      if (fallbackTriggered) return;
      fallbackTriggered = true;
      console.warn("[La Rémissa Map] Thunderforest indisponible (clé invalide/quota/service down) — repli sur CartoDB.");
      state.map.removeLayer(thunderLayer);
      cartoFallback.addTo(state.map);
    });

    thunderLayer.addTo(state.map);
  } else {
    console.warn("[La Rémissa Map] Aucune clé Thunderforest renseignée : fond CartoDB utilisé par défaut.");
    cartoFallback.addTo(state.map);
  }

  // Regroupement des marqueurs proches en clusters quand on dézoome
  state.markersLayer = L.markerClusterGroup({
    maxClusterRadius: 22,          // encore plus petit : ne regroupe que les marqueurs vraiment très proches
    disableClusteringAtZoom: 13,   // dès ce zoom (relativement large), tous les marqueurs s'affichent individuellement
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
  });
  state.map.addLayer(state.markersLayer);
}


// Icône en forme de pin (goutte inversée, façon Google Maps), colorée par catégorie
function makePinIcon(color) {
  const svg = `
    <svg width="30" height="40" viewBox="0 0 30 40" xmlns="http://www.w3.org/2000/svg">
      <path d="M15 0C6.7 0 0 6.7 0 15c0 10.5 13 23.6 14 24.6.5.5 1.4.5 2 0C17 38.6 30 25.5 30 15 30 6.7 23.3 0 15 0z"
            fill="${color}" stroke="#ffffff" stroke-width="2"/>
      <circle cx="15" cy="15" r="6" fill="#ffffff"/>
    </svg>`;
  return L.divIcon({
    className: "pin-marker",
    html: svg,
    iconSize: [30, 40],
    iconAnchor: [15, 39],   // pointe du pin = position exacte du lieu
    popupAnchor: [0, -34],
  });
}

function renderMarkers(places) {
  state.markersLayer.clearLayers();
  const withCoords = places.filter(p => p.lat !== null && p.lng !== null);

  withCoords.forEach(place => {
    const marker = L.marker([place.lat, place.lng], {
      icon: makePinIcon(effectiveColor(place)),
    });
    marker.on("click", () => openModal(place));
    state.markersLayer.addLayer(marker);
  });
}

// Cadre la carte pour englober tous les lieux — appelé une seule fois au
// chargement initial, pas à chaque filtre (pour que la vue reste stable
// et que les clusters ne "sautent" pas pendant qu'on tape une recherche)
function fitMapToPlaces(places) {
  const withCoords = places.filter(p => p.lat !== null && p.lng !== null);
  if (withCoords.length === 0) return;
  const bounds = L.latLngBounds(withCoords.map(p => [p.lat, p.lng]));
  state.map.fitBounds(bounds, { padding: [30, 30], maxZoom: 13 });
}

/* ============================================================
   7. LISTE (cartes façon Softr)
   ============================================================ */
function renderCards(places) {
  const grid = document.getElementById("cardsGrid");
  const empty = document.getElementById("emptyState");

  grid.innerHTML = "";

  if (places.length === 0) {
    empty.hidden = false;
    return;
  }
  empty.hidden = true;

  const frag = document.createDocumentFragment();

  places.forEach(place => {
    const card = document.createElement("article");
    card.className = "place-card";
    card.tabIndex = 0;

    const statusStyle = STATUS_STYLES[place.statut] || { bg: "#E2E8F0", text: "#475569" };

    card.innerHTML = `
      <div class="place-card-photo-wrap">
        ${place.photo
          ? `<img class="place-card-photo" src="${escapeHtml(place.photo)}" alt="${escapeHtml(place.nom)}" loading="lazy">`
          : `<div class="place-card-photo placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 16l-5-5-4 4-3-3-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>Pas de photo</div>`
        }
        <div class="card-badges-overlay">${cardCategoryOverlayHtml(place)}</div>
      </div>
      <div class="place-card-body">
        <h3 class="place-card-title">${escapeHtml(place.nom)}</h3>
        ${place.statut ? `<div class="badge-row"><span class="badge badge-status" style="background:${statusStyle.bg};color:${statusStyle.text}">${escapeHtml(place.statut)}</span></div>` : ""}
        ${place.adresse ? `<p class="place-card-address">📍 ${escapeHtml(place.adresse)}</p>` : ""}
        <button type="button" class="btn-primary card-details-btn">↗ Détails</button>
      </div>
    `;

    card.addEventListener("click", () => openModal(place));
    frag.appendChild(card);
  });

  grid.appendChild(frag);
}

/* ============================================================
   8. MODALE DE DÉTAILS
   ============================================================ */
function openModal(place) {
  const statusStyle = STATUS_STYLES[place.statut] || { bg: "#E2E8F0", text: "#475569" };
  const content = document.getElementById("modalContent");

  const photoHtml = place.photo
    ? `<img class="modal-photo" src="${escapeHtml(place.photo)}" alt="${escapeHtml(place.nom)}">`
    : `<div class="modal-photo placeholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="M21 16l-5-5-4 4-3-3-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg>Pas de photo</div>`;

  content.innerHTML = `
    <div class="modal-body">
      <h2 class="modal-title">${escapeHtml(place.nom)}</h2>
      ${place.infos ? `<p class="modal-description">${escapeHtml(place.infos)}</p>` : ""}
      <div class="modal-photo-wrap">${photoHtml}</div>
      <div class="badge-row">
        ${categoryBadgesHtml(place)}
        ${place.statut ? `<span class="badge badge-status" style="background:${statusStyle.bg};color:${statusStyle.text}">${escapeHtml(place.statut)}</span>` : ""}
      </div>
      <div class="modal-info-grid">
        ${place.adresse ? `<div><p class="modal-field-label">Adresse</p><p class="modal-field-value">${escapeHtml(place.adresse)}</p></div>` : ""}
        ${place.site ? `<div><p class="modal-field-label">Site web</p><p class="modal-field-value"><a href="${escapeHtml(place.site)}" target="_blank" rel="noopener">${escapeHtml(place.site)}</a></p></div>` : ""}
      </div>
      <p class="modal-date">Testé le<br>${place.dateAjout ? escapeHtml(place.dateAjout) : "-"}</p>
      ${place.urlMaps
        ? `<a class="btn-primary" href="${escapeHtml(place.urlMaps)}" target="_blank" rel="noopener">↗ Ouvrir dans Google Maps</a>`
        : ""
      }
    </div>
  `;

  document.getElementById("modalOverlay").hidden = false;
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modalOverlay").hidden = true;
  document.body.style.overflow = "";
}

/* ============================================================
   9. FILTRES (catégorie + statut) & RECHERCHE OUVERTE
   ============================================================ */
function buildFilterChips() {
  // Toutes les catégories réellement présentes (chaque lieu peut en avoir
  // plusieurs), aplaties et dédupliquées, dans l'ordre de la charte
  const allTags = [...new Set(state.allPlaces.flatMap(p => p.categories))];
  const presentCategories = CATEGORY_ORDER.filter(cat => allTags.includes(cat));
  const extraCategories = allTags.filter(cat => cat && !CATEGORY_ORDER.includes(cat));
  const categories = [...presentCategories, ...extraCategories];

  const catContainer = document.getElementById("categoryChips");
  catContainer.innerHTML = `<button class="chip chip-all active" data-cat="all">Toutes catégories</button>` +
    categories.map(cat => `
      <button class="chip" data-cat="${escapeHtml(cat)}" style="color:${categoryColor(cat)}">
        <span class="dot" style="background:${categoryColor(cat)}"></span>${escapeHtml(cat)}
      </button>
    `).join("");

  catContainer.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => {
      catContainer.querySelectorAll(".chip").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.category = btn.dataset.cat;
      applyFilters();
    });
  });

  // Statuts
  const presentStatuses = STATUS_ORDER.filter(s => state.allPlaces.some(p => p.statut === s));
  const statusContainer = document.getElementById("statusChips");
  statusContainer.innerHTML = `<button class="chip chip-all active" data-status="all">Tous statuts</button>` +
    presentStatuses.map(s => {
      const style = STATUS_STYLES[s];
      return `<button class="chip" data-status="${escapeHtml(s)}" style="background:${style.bg};color:${style.text}">${escapeHtml(s)}</button>`;
    }).join("");

  statusContainer.querySelectorAll(".chip").forEach(btn => {
    btn.addEventListener("click", () => {
      statusContainer.querySelectorAll(".chip").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      state.status = btn.dataset.status;
      applyFilters();
    });
  });
}

// Bandeau de statistiques : nombre de lieux par statut + taux d'approbation
function renderStats() {
  const total = state.allPlaces.length;
  const counts = {};
  STATUS_ORDER.forEach(s => { counts[s] = state.allPlaces.filter(p => p.statut === s).length; });
  const approuves = counts["Approuvé"] || 0;
  const taux = total > 0 ? ((approuves / total) * 100).toFixed(1) : "0.0";

  const statLabels = { "À faire": "À faire", "Approuvé": "Approuvés", "Surcoté": "Surcoté" };
  const statColors = { "À faire": STATUS_STYLES["À faire"].text, "Approuvé": STATUS_STYLES["Approuvé"].text, "Surcoté": STATUS_STYLES["Surcoté"].text };

  const cards = STATUS_ORDER.map(s => `
    <div class="stat-card">
      <p class="stat-label" style="color:${statColors[s]}">${escapeHtml(statLabels[s])}</p>
      <p class="stat-value">${counts[s] || 0}</p>
    </div>
  `).join("") + `
    <div class="stat-card">
      <p class="stat-label" style="color:${categoryColor(CATEGORY_ORDER[3]) /* bleu Cul'ture, cohérent avec la charte */}">Taux d'approbation Rémissa</p>
      <p class="stat-value">${taux.replace(".", ",")} %</p>
    </div>
  `;

  document.getElementById("statsRow").innerHTML = cards;
}

function applyFilters() {
  const term = normalize(state.search);

  state.filtered = state.allPlaces.filter(place => {
    if (state.category !== "all" && !place.categories.includes(state.category)) return false;
    if (state.status !== "all" && place.statut !== state.status) return false;
    if (state.hideResolved && place.statut !== "À faire") return false;

    if (term) {
      const haystack = normalize(`${place.nom} ${place.adresse} ${place.infos}`);
      if (!haystack.includes(term)) return false;
    }
    return true;
  });

  // Tri alphabétique (insensible aux accents/majuscules)
  state.filtered.sort((a, b) => a.nom.localeCompare(b.nom, "fr", { sensitivity: "base" }));

  renderMarkers(state.filtered);
  renderCards(state.filtered);

  // Zoom sur les résultats si un filtre (recherche, catégorie, statut ou le
  // masquage des lieux faits) est actif ; sinon on revient à la vue Île-de-France.
  if (state.map) {
    const filtersActive = term !== "" || state.category !== "all" || state.status !== "all" || state.hideResolved;
    if (filtersActive) {
      fitMapToPlaces(state.filtered);
    } else {
      state.map.setView(DEFAULT_CENTER, DEFAULT_ZOOM);
    }
  }
}

/* ============================================================
   10. NAVIGATION (Carte / Liste)
   ============================================================ */
function switchView(viewId) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.getElementById(viewId).classList.add("active");

  document.querySelectorAll(".nav-tab").forEach(b => b.classList.remove("active"));
  document.querySelector(`.nav-tab[data-view="${viewId}"]`).classList.add("active");

  // La liste défile avec la page entière (pas de panneau à scroll interne) ;
  // la carte, elle, a besoin d'une hauteur fixe pour s'afficher correctement.
  document.documentElement.classList.toggle("list-mode", viewId === "listView");

  if (viewId === "mapView" && state.map) {
    setTimeout(() => state.map.invalidateSize(), 50);
  }
}

/* ============================================================
   11. INITIALISATION
   ============================================================ */
function init() {
  // Message de bienvenue aléatoire
  document.getElementById("welcomeText").textContent =
    WELCOME_MESSAGES[Math.floor(Math.random() * WELCOME_MESSAGES.length)];

  initMap();

  // Recherche instantanée
  const searchInput = document.getElementById("searchInput");
  const clearBtn = document.getElementById("clearSearch");
  searchInput.addEventListener("input", (e) => {
    state.search = e.target.value;
    clearBtn.hidden = state.search.length === 0;
    applyFilters();
  });
  clearBtn.addEventListener("click", () => {
    searchInput.value = "";
    state.search = "";
    clearBtn.hidden = true;
    applyFilters();
    searchInput.focus();
  });

  // Bascule "masquer les lieux faits et non validés" (ne garde que "À faire")
  const toggleResolvedBtn = document.getElementById("toggleResolvedBtn");
  toggleResolvedBtn.addEventListener("click", () => {
    state.hideResolved = !state.hideResolved;
    toggleResolvedBtn.textContent = state.hideResolved
      ? "Afficher les lieux faits et non validés"
      : "Masquer les lieux faits et non validés";
    toggleResolvedBtn.classList.toggle("active", state.hideResolved);
    applyFilters();
  });

  // Onglets bas de page
  document.querySelectorAll(".nav-tab").forEach(btn => {
    btn.addEventListener("click", () => switchView(btn.dataset.view));
  });

  // Modale
  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.getElementById("modalOverlay").addEventListener("click", (e) => {
    if (e.target.id === "modalOverlay") closeModal();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") closeModal();
  });

  loadData();
}

document.addEventListener("DOMContentLoaded", init);

</script>

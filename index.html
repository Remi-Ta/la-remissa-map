<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>La Rémissa Map</title>
<meta name="theme-color" content="#B34E6B">

<!-- Polices : Fraunces (titres, chaleureux) + Inter (texte, lisible sur mobile) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Leaflet.js — carte 100% gratuite et illimitée (fond CartoDB Positron) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

  <!-- ===== HEADER : titre + message de bienvenue aléatoire ===== -->
  <header class="app-header">
    <div class="header-inner">
      <h1 class="app-title">La Rémissa <span>Map</span></h1>
      <p class="welcome-text" id="welcomeText">Bienvenue — Tout est prêt</p>
    </div>
  </header>

  <!-- ===== RECHERCHE + FILTRES (barre unique, ouverte) ===== -->
  <div class="search-panel">

    <div class="search-bar">
      <svg class="icon-search" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
        <path d="M20 20L16.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Rechercher un lieu, une adresse, une info…" autocomplete="off" inputmode="search">
      <button id="clearSearch" class="clear-btn" hidden aria-label="Effacer la recherche">&times;</button>
    </div>

    <!-- Filtres catégories : chips défilables horizontalement -->
    <div class="chip-scroll" id="categoryChips" role="tablist" aria-label="Filtrer par catégorie"></div>

    <!-- Filtres statut : segments -->
    <div class="status-segment" id="statusSegment" role="tablist" aria-label="Filtrer par statut"></div>

  </div>

  <!-- ===== CONTENU : Carte ou Liste selon l'onglet actif ===== -->
  <main class="content">

    <section id="mapView" class="view active">
      <div id="map"></div>
    </section>

    <section id="listView" class="view">
      <div class="cards-grid" id="cardsGrid"></div>
      <p class="empty-state" id="emptyState" hidden>Aucun lieu ne correspond à votre recherche.</p>
    </section>

  </main>

  <!-- ===== NAVIGATION BASSE (mobile-first, style app) ===== -->
  <nav class="bottom-nav">
    <button class="nav-btn active" data-view="mapView">
      <svg viewBox="0 0 24 24" fill="none"><path d="M9 20l-6-2V4l6 2m0 14l6-2m-6 2V6m6 12l6 2V6l-6-2m0 16V4m0 2L9 4" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span>Carte</span>
    </button>
    <button class="nav-btn" data-view="listView">
      <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="4" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="4" y="13" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/><rect x="13" y="13" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.8"/></svg>
      <span>Liste</span>
    </button>
  </nav>

  <!-- ===== MODALE DE DÉTAILS ===== -->
  <div class="modal-overlay" id="modalOverlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <button class="modal-close" id="modalClose" aria-label="Fermer">&times;</button>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <!-- ===== ÉCRAN DE CHARGEMENT ===== -->
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <p>Chargement des lieux…</p>
  </div>

  <!-- ===== ÉCRAN D'ERREUR (si Google Sheets injoignable) ===== -->
  <div class="error-state" id="errorState" hidden>
    <p>Impossible de charger les données. Vérifiez le lien Google Sheets dans <code>js/app.js</code>.</p>
  </div>

</div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- PapaParse — lecture du CSV Google Sheets -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script src="js/app.js"></script>
</body>
</html>
